name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: Publish to VS Code Marketplace
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  VSCE_PAT: ${{ secrets.VSCE_PAT }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install native build prerequisites
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libsqlite3-dev

      - run: npm ci
      - run: npm run test:native
      - run: npm test

  build-electron-native:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: electron-native-linux-x64
            npm_config_arch: x64
          - os: windows-2022
            artifact: electron-native-win32-x64
            npm_config_arch: x64
          - os: macos-15
            artifact: electron-native-darwin-arm64
            npm_config_arch: arm64
          - os: macos-15-intel
            artifact: electron-native-darwin-x64
            npm_config_arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install native build prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libsqlite3-dev

      - run: npm ci

      - name: Verify native runner architecture
        run: node -e "if (process.arch !== '${{ matrix.npm_config_arch }}') throw new Error('Expected ${{ matrix.npm_config_arch }} runner, got ' + process.arch)"

      - name: Rebuild better-sqlite3 for Electron
        run: node scripts/rebuild-electron.js all
        env:
          npm_config_arch: ${{ matrix.npm_config_arch }}
          npm_config_target_arch: ${{ matrix.npm_config_arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native/
          if-no-files-found: error

  build-node-native:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        node:
          - version: 20
            abi: 115
          - version: 22
            abi: 127
          - version: 24
            abi: 137
        target:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64
          - os: macos-15
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node.version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install native build prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libsqlite3-dev

      - run: npm ci

      - name: Verify native runner architecture
        run: node -e "if (process.arch !== '${{ matrix.target.arch }}') throw new Error('Expected ${{ matrix.target.arch }} runner, got ' + process.arch)"

      - name: Rebuild better-sqlite3 for system Node
        run: node scripts/rebuild-node.js
        env:
          npm_config_arch: ${{ matrix.target.arch }}
          npm_config_target_arch: ${{ matrix.target.arch }}

      - name: Verify runtime ABI selected by setup-node
        shell: bash
        run: |
          ACTUAL_ABI=$(node -p "process.versions.modules")
          if [ "$ACTUAL_ABI" != "${{ matrix.node.abi }}" ]; then
            echo "::error::Node ${{ matrix.node.version }} has ABI $ACTUAL_ABI; expected ${{ matrix.node.abi }}"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: node-native-${{ matrix.target.platform }}-${{ matrix.target.arch }}-node${{ matrix.node.version }}
          path: native-node/
          if-no-files-found: error

  package:
    needs:
      - build-electron-native
      - build-node-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-native-*'

      - name: Merge native binaries
        run: node scripts/merge-native-artifacts.js
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts

      - name: Validate native binaries
        run: node scripts/validate-native-artifacts.js

      - run: npm ci
      - run: npm run build

      - name: Validate version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - run: npm run package

      - name: Resolve VSIX path
        id: vsix
        shell: bash
        run: |
          VSIX=$(node -p "require('./package.json').name + '-' + require('./package.json').version + '.vsix'")
          echo "path=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Validate packaged native matrices and load Node binding
        run: node scripts/validate-vsix-native.js "${{ steps.vsix.outputs.path }}" --require-smoke

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: >
          (github.event_name == 'push' || inputs.publish_marketplace == true) &&
          env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.path }}"

      - name: Warn when Marketplace publish skipped
        if: >
          (github.event_name == 'push' || inputs.publish_marketplace == true) &&
          env.VSCE_PAT == ''
        run: echo "::warning::VSCE_PAT not set — built the .vsix but skipped Marketplace publish."

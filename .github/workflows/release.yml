name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: Publish to VS Code Marketplace
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  VSCE_PAT: ${{ secrets.VSCE_PAT }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install native build prerequisites
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libsqlite3-dev

      - run: npm ci
      - run: npm run build
      - run: node scripts/rebuild-node.js
      - run: npm test

  build-native:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: native-linux-x64
          - os: windows-latest
            artifact: native-win32-x64
          - os: macos-latest
            artifact: native-darwin-arm64
          - os: macos-latest
            artifact: native-darwin-x64
            npm_config_arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install native build prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libsqlite3-dev

      - run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: node scripts/rebuild-electron.js all
        env:
          npm_config_arch: ${{ matrix.npm_config_arch || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native/
          if-no-files-found: error

  package:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: native-*
          merge-multiple: true

      - name: Merge native binaries
        run: node scripts/merge-native-artifacts.js
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts

      - run: npm ci
      - run: npm run build

      - name: Validate version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - run: npm run package

      - name: Resolve VSIX path
        id: vsix
        shell: bash
        run: |
          VSIX=$(node -p "require('./package.json').name + '-' + require('./package.json').version + '.vsix'")
          echo "path=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: >
          (github.event_name == 'push' || inputs.publish_marketplace == true) &&
          env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.path }}"

      - name: Warn when Marketplace publish skipped
        if: >
          (github.event_name == 'push' || inputs.publish_marketplace == true) &&
          env.VSCE_PAT == ''
        run: echo "::warning::VSCE_PAT not set — built the .vsix but skipped Marketplace publish."
